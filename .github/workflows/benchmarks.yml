name: Performance Benchmarks

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "crates/**/*.rs"
      - "**/Cargo.toml"
      - "**/Cargo.lock"
  push:
    branches: [main]
    paths:
      - "crates/**/*.rs"
      - "**/Cargo.toml"

permissions:
  contents: write
  pull-requests: write

jobs:
  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y -qq build-essential pkg-config libssl-dev protobuf-compiler

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: bench-${{ hashFiles('**/Cargo.lock') }}

      - name: Run benchmarks
        run: |
          # Create benchmarks directory if it doesn't exist
          mkdir -p target/benchmarks

          # Build in release mode and time it
          echo "Building fig_cli in release mode..."
          time cargo build --release --locked -p fig_cli

          # Test startup time
          echo "Testing startup time..."
          hyperfine --warmup 3 --runs 10 \
            'target/release/fig_cli --version' \
            --export-markdown target/benchmarks/startup-time.md || true

          # Test help command performance
          echo "Testing help command..."
          hyperfine --warmup 3 --runs 10 \
            'target/release/fig_cli --help' \
            --export-markdown target/benchmarks/help-time.md || true

      - name: Install hyperfine
        run: |
          wget https://github.com/sharkdp/hyperfine/releases/download/v1.18.0/hyperfine_1.18.0_amd64.deb
          sudo dpkg -i hyperfine_1.18.0_amd64.deb

      - name: Binary size report
        run: |
          echo "## Binary Size Report" > target/benchmarks/size-report.md
          echo "" >> target/benchmarks/size-report.md
          ls -lh target/release/fig_cli | awk '{print "- **fig_cli**: " $5}' >> target/benchmarks/size-report.md

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: target/benchmarks/

      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const sizeReport = fs.readFileSync('target/benchmarks/size-report.md', 'utf8');

            const body = `## Performance Benchmark Results\n\n${sizeReport}`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
